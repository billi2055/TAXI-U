<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>司機營收試算 V6</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; 
        }
        #surcharge {
            background-color: #e8f5e9;
            border-color: #81c784;
            color: #2e7d32;
            font-weight: bold;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #007bff;
            color: white;
            font-size: 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:active {
            background-color: #0056b3;
        }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 8px;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 18px;
        }
        .highlight {
            font-weight: bold;
        }
        .final-income {
            font-weight: bold;
            color: #d63384;
            font-size: 26px;
            border-top: 2px solid #ccc;
            padding-top: 10px;
            margin-top: 10px;
        }
        .note {
            font-size: 12px;
            color: #888;
            text-align: center;
            margin-top: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🚕 司機營收 V6</h2>

    <div class="input-group">
        <label>行駛時間 (分鐘)</label>
        <input type="number" id="minutes" placeholder="輸入分鐘數" onfocus="clearAll()">
    </div>

    <div class="input-group">
        <label>行駛里程 (公里)</label>
        <input type="number" id="km" step="0.01" placeholder="例如：10.55">
    </div>

    <div class="input-group">
        <label>平台加價金額 (+元)</label>
        <input type="number" id="surcharge" value="0" placeholder="輸入加價" onfocus="if(this.value=='0')this.value='';">
    </div>

    <button onclick="calculateFare()">計算實收</button>

    <div class="result-box" id="resultArea" style="display:none;">
        <div class="result-row">
            <span>統計費用 (總車資)：</span>
            <span id="statsFare" class="highlight">$0</span>
        </div>

        <div class="result-row" style="color: #dc3545;">
            <span>平台抽成 (25%)：</span>
            <span id="commission">-$0</span>
        </div>
        
        <div class="result-row final-income">
            <span>實拿金額：</span>
            <span id="netIncome">$0</span>
        </div>
    </div>

    <div class="note">
        <strong>操作優化：</strong><br>
        1. 點擊「時間」欄位：全頁面清空重置。<br>
        2. 點擊「加價」欄位：自動消除預設的 0。<br>
        3. 里程支援小數點第二位。
    </div>
</div>

<script>
    function clearAll() {
        document.getElementById('minutes').value = '';
        document.getElementById('km').value = '';
        document.getElementById('surcharge').value = '0';
        document.getElementById('resultArea').style.display = 'none';
    }

    function calculateFare() {
        let km = parseFloat(document.getElementById('km').value);
        let minutes = parseFloat(document.getElementById('minutes').value);
        let surcharge = parseFloat(document.getElementById('surcharge').value);

        if (isNaN(km)) km = 0;
        if (isNaN(minutes)) minutes = 0;
        if (isNaN(surcharge)) surcharge = 0;

        const baseFare = 100;       
        const baseKm = 1.25;        
        const ratePerKm = 25;       
        const ratePerMin = 2;       
        const platformRate = 0.25;  

        let extraKm = km - baseKm;
        if (extraKm < 0) extraKm = 0;
        
        let distanceFare = extraKm * ratePerKm;
        let totalFare = baseFare + distanceFare + (minutes * ratePerMin) + surcharge;
        
        totalFare = Math.round(totalFare);

        let fee = Math.round(totalFare * platformRate);
        let myIncome = totalFare - fee;

        document.getElementById('statsFare').innerText = "$" + totalFare;
        document.getElementById('commission').innerText = "-$" + fee;
        document.getElementById('netIncome').innerText = "$" + myIncome;

        document.getElementById('resultArea').style.display = 'block';
    }
</script>

</body>
</html>
