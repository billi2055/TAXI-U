<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>司機營收試算 V8</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; 
        }
        #surcharge {
            background-color: #e8f5e9;
            border-color: #81c784;
            color: #2e7d32;
            font-weight: bold;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #007bff;
            color: white;
            font-size: 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:active {
            background-color: #0056b3;
        }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 8px;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 18px;
        }
        .highlight {
            font-weight: bold;
        }
        .final-income {
            font-weight: bold;
            color: #d63384;
            font-size: 26px;
            border-top: 2px solid #ccc;
            padding-top: 10px;
            margin-top: 10px;
        }
        
        /* V8 新增：比對表格樣式 (依照手繪圖設計) */
        .compare-table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            background-color: white;
            border: 2px solid #007bff; 
            border-radius: 8px;
            overflow: hidden;
            text-align: center;
        }
        .compare-table th {
            background-color: #e9ecef;
            color: #333;
            padding: 10px 5px;
            font-size: 14px;
            border-bottom: 1px solid #007bff;
            border-right: 1px solid #ccc;
        }
        .compare-table td {
            padding: 10px 5px;
            border-right: 1px solid #ccc;
            vertical-align: middle;
        }
        .compare-table th:last-child, .compare-table td:last-child {
            border-right: none;
        }
        .compare-input {
            width: 90%;
            padding: 8px;
            font-size: 18px;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 5px;
            color: #007bff;
            font-weight: bold;
        }
        .diff-text {
            font-size: 18px;
            font-weight: bold;
            color: #dc3545; /* 預設紅色代表被少給錢了 */
        }
        
        .note {
            font-size: 12px;
            color: #888;
            text-align: center;
            margin-top: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🚕 營收試算 V8</h2>

    <div class="input-group">
        <label>行駛時間 (分鐘)</label>
        <input type="number" id="minutes" placeholder="輸入分鐘數" onfocus="clearAll()">
    </div>

    <div class="input-group">
        <label>行駛里程 (公里)</label>
        <input type="number" id="km" step="0.01" placeholder="例如：10.55">
    </div>

    <div class="input-group">
        <label>平台加價金額 (+元)</label>
        <input type="number" id="surcharge" value="0" placeholder="輸入加價" onfocus="if(this.value=='0')this.value='';">
    </div>

    <button onclick="calculateFare()">計算實收</button>

    <div class="result-box" id="resultArea" style="display:none;">
        <div class="result-row">
            <span>統計費用 (總車資)：</span>
            <span id="statsFare" class="highlight">$0</span>
        </div>

        <div class="result-row" style="color: #dc3545;">
            <span>平台抽成 (25%)：</span>
            <span id="commission">-$0</span>
        </div>
        
        <div class="result-row final-income">
            <span>實拿金額：</span>
            <span id="netIncome">$0</span>
        </div>
        
        <table class="compare-table">
            <tr>
                <th width="40%">平台金額</th>
                <th width="30%">差異</th>
                <th width="30%">差異百分比</th>
            </tr>
            <tr>
                <td>
                    <input type="number" id="platformAmount" class="compare-input" placeholder="輸入金額" 
                           oninput="if(this.value.length > 5) this.value = this.value.slice(0, 5); checkDifference();"
                           onfocus="if(this.value=='0')this.value='';">
                </td>
                <td><span id="diffAmount" class="diff-text">-</span></td>
                <td><span id="diffPercent" class="diff-text">-</span></td>
            </tr>
        </table>
    </div>

    <div class="note">
        <strong>V8版功能：</strong><br>
        下方表格輸入平台顯示金額<br>
        自動比對出「少拿的差額」與「百分比」。
    </div>
</div>

<script>
    // 儲存全域變數，供下方比對使用
    let globalNetIncome = 0;

    function clearAll() {
        document.getElementById('minutes').value = '';
        document.getElementById('km').value = '';
        document.getElementById('surcharge').value = '0';
        document.getElementById('platformAmount').value = '';
        document.getElementById('diffAmount').innerText = '-';
        document.getElementById('diffPercent').innerText = '-';
        document.getElementById('resultArea').style.display = 'none';
        globalNetIncome = 0;
    }

    function calculateFare() {
        let km = parseFloat(document.getElementById('km').value);
        let minutes = parseFloat(document.getElementById('minutes').value);
        let surcharge = parseFloat(document.getElementById('surcharge').value);

        if (isNaN(km)) km = 0;
        if (isNaN(minutes)) minutes = 0;
        if (isNaN(surcharge)) surcharge = 0;

        const baseFare = 100;       
        const baseKm = 1.25;        
        const ratePerKm = 25;       
        const ratePerMin = 2;       
        const platformRate = 0.25;  

        let extraKm = km - baseKm;
        if (extraKm < 0) extraKm = 0;
        
        let distanceFare = extraKm * ratePerKm;
        let totalFare = baseFare + distanceFare + (minutes * ratePerMin) + surcharge;
        
        totalFare = Math.round(totalFare);

        let fee = Math.round(totalFare * platformRate);
        
        // 算出實拿金額，存進變數中
        globalNetIncome = totalFare - fee; 

        document.getElementById('statsFare').innerText = "$" + totalFare;
        document.getElementById('commission').innerText = "-$" + fee;
        document.getElementById('netIncome').innerText = "$" + globalNetIncome;

        document.getElementById('resultArea').style.display = 'block';
        
        // 重新計算比對表格（若原本有填寫金額）
        checkDifference();
    }

    // V8 新增：計算平台差異的函數
    function checkDifference() {
        let platformVal = document.getElementById('platformAmount').value;
        let diffSpan = document.getElementById('diffAmount');
        let pctSpan = document.getElementById('diffPercent');

        // 如果還沒輸入平台金額，或實拿金額為0，就顯示橫線
        if (platformVal === '' || isNaN(platformVal) || globalNetIncome === 0) {
            diffSpan.innerText = '-';
            pctSpan.innerText = '-';
            diffSpan.style.color = "#dc3545"; 
            pctSpan.style.color = "#dc3545";
            return;
        }

        let platformAmount = parseFloat(platformVal);

        // 邏輯：預估200，平台168 -> 差異 = 200 - 168 = 32元
        let difference = globalNetIncome - platformAmount;
        
        // 百分比：32 / 200 = 16.0%
        let percentage = (difference / globalNetIncome) * 100;

        // 顯示結果 (保留小數點後 1 位)
        diffSpan.innerText = difference + "元";
        pctSpan.innerText = percentage.toFixed(1) + "%";

        // 加上顏色提示：如果有少錢(大於0)顯示紅色，剛好或多給顯示綠色
        if (difference > 0) {
            diffSpan.style.color = "#dc3545"; // 紅色
            pctSpan.style.color = "#dc3545";
        } else {
            // 如果平台給的比較多，顯示為負數差異，用綠色字體
            diffSpan.style.color = "#28a745"; // 綠色
            pctSpan.style.color = "#28a745";
        }
    }
</script>

</body>
</html>
